<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact Phatsimo Bakang Maseng ">
  <title>Contact | Phatsimo Maseng</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <a class="skip-link" href="#main-content">Skip to main content</a>

  <header>
    <div class="container">
      <p id="site-logo" > 
          <img
            src="images/logo.jpg" alt="logo image" width='100px' height='100px'
            style="display: block; margin: 0 auto;"
          >
      </p>
      <nav id="main-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="contact.html" class="nav-active" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content">

    <section class="page-banner" aria-labelledby="page-title">
      <h1 id="page-title">Contact Me</h1>
      <p>Have a project in mind or want to collaborate? I would love to hear from you.</p>
    </section>

    <section class="section-gap" aria-labelledby="form-heading">
      <article class="container form-wrap">
        <h2 id="form-heading">Get In Touch</h2>

        <form action="#" method="post" novalidate aria-label="Contact form">

          <p class="form-group">
            <label for="name">Full Name <span class="required-mark" aria-hidden="true">*</span></label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Your full name"
              required
              minlength="2"
              autocomplete="name"
            >
          </p>

          <p class="form-group">
            <label for="email">Email Address <span class="required-mark" aria-hidden="true">*</span></label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$"
              autocomplete="email"
            >
          </p>

          <p class="form-group">
            <label for="phone">Phone Number <span style="font-weight:normal; color:#4a4540;">(optional)</span></label>
            <input
              type="tel"
              id="phone"
              name="phone"
              placeholder="+27 81 234 5678"
              pattern="[+0-9\s\-()]{7,20}"
              autocomplete="tel"
              aria-describedby="phone-hint"
            >
            <small id="phone-hint" style="display:block; margin-top:0.3rem; font-size:0.8rem; color:#4a4540;">Format: +27 81 234 5678</small>
          </p>

          <p class="form-group">
            <label for="project-type">Project Type <span class="required-mark" aria-hidden="true">*</span></label>
            <select id="project-type" name="project-type" required>
              <option value="" disabled selected>Select a project type&hellip;</option>
              <option value="website">Website Design &amp; Development</option>
              <option value="landing">Landing Page</option>
              <option value="redesign">Website Redesign</option>
              <option value="collaboration">Collaboration</option>
              <option value="other">Other</option>
            </select>
          </p>


          <fieldset class="form-group">
            <legend>Services Interested In</legend>
            <p class="checkbox-group">
              <label><input type="checkbox" name="services" value="html-css"> HTML &amp; CSS Development</label>
              <label><input type="checkbox" name="services" value="js"> JavaScript Functionality</label>
              <label><input type="checkbox" name="services" value="responsive"> Responsive Design</label>
              <label><input type="checkbox" name="services" value="accessibility"> Accessibility Improvements</label>
            </p>
          </fieldset>


          <p class="form-group">
            <label for="message">Your Message <span class="required-mark" aria-hidden="true">*</span></label>
            <textarea
              id="message"
              name="message"
              placeholder="Tell me about your project or question&hellip;"
              required
              minlength="20"
            ></textarea>
          </p>

          <p class="form-group">
            <label class="checkbox-inline">
              <input type="checkbox" id="consent" name="consent" value="agreed" required>
              I agree to be contacted regarding this enquiry <span class="required-mark" aria-hidden="true">*</span>
            </label>
          </p>

          <button type="submit" class="btn btn-dark btn-full">Send Message</button>

        </form>
      </article>
    </section>

  </main>


  <footer>
    <p class="footer-logo"> 

          <img
            src="images/logo.jpg" alt="logo image" width='100px' height='100px' style="display: block; margin: 0 auto;"
          >
    </p>
    <p>&copy; 2026 Phatsimo Bakang Maseng. All rights reserved.</p>
    <p><a href="mailto:email@example.com">email@example.com</a></p>
  </footer>

</body>
</html>
